<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>연락처 등록</h2>
    <form method="POST" action="{% url 'phone:create' %}">
        {% csrf_token %}
        이름 : <input type="text" name="name" value="{{ name|default:'' }}"><br><br>
        번호 : <input type="text" name="phone_num" value="{{ name|default:'' }}"><br><br>
        이메일 : <input type="text" name="email" value="{{ name|default:'' }}"><br><br>
        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}
        <input type="submit" value="등록">
    </form>
</body>
</html>
